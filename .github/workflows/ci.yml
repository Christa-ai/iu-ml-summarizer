name: CI / Docker Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── Unit tests ───────────────────────────────────────────────────────────────
  test:
    name: Run unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: pytest tests/ -v --tb=short

  # ── Docker build & smoke test ────────────────────────────────────────────────
  docker-build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test          # only build if tests pass

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t summarizer:ci .

      - name: Smoke test (container starts and serves HTTP)
        run: |
          docker run -d -p 8050:8050 --name summarizer-test summarizer:ci
          echo "Waiting for app to start..."
          sleep 25
          curl --fail --silent --max-time 10 http://localhost:8050 \
            && echo "OK — app is responding" \
            || (docker logs summarizer-test && exit 1)
          docker stop summarizer-test
